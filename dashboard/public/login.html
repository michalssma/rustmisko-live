<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — RustMisko</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <h1>⚡ RustMisko</h1>
    <p class="login-sub">🔐 LOGIN</p>
    <div id="login-error" class="error-msg hidden"></div>
    <div class="pin-dots">
      <span class="pin-dot" id="d0"></span>
      <span class="pin-dot" id="d1"></span>
      <span class="pin-dot" id="d2"></span>
      <span class="pin-dot" id="d3"></span>
      <span class="pin-dot" id="d4"></span>
      <span class="pin-dot" id="d5"></span>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress('1')">1</button>
      <button class="num-btn" onclick="numPress('2')">2</button>
      <button class="num-btn" onclick="numPress('3')">3</button>
      <button class="num-btn" onclick="numPress('4')">4</button>
      <button class="num-btn" onclick="numPress('5')">5</button>
      <button class="num-btn" onclick="numPress('6')">6</button>
      <button class="num-btn" onclick="numPress('7')">7</button>
      <button class="num-btn" onclick="numPress('8')">8</button>
      <button class="num-btn" onclick="numPress('9')">9</button>
      <div></div>
      <button class="num-btn" onclick="numPress('0')">0</button>
      <button class="num-btn num-del" onclick="numDel()">⌫</button>
    </div>
  </div>
  <script>
    let pin = '';
    function updateDots() {
      for (let i = 0; i < 6; i++)
        document.getElementById('d'+i).classList.toggle('filled', i < pin.length);
    }
    function numPress(d) {
      if (pin.length >= 6) return;
      pin += d; updateDots();
      if (pin.length === 6) setTimeout(doLogin, 100);
    }
    function numDel() { pin = pin.slice(0,-1); updateDots(); }
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') numPress(e.key);
      else if (e.key === 'Backspace') numDel();
    });
    async function doLogin() {
      try {
        const r = await fetch('/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ pin }) });
        const data = await r.json();
        if (data.ok) { window.location.href = '/'; }
        else { showError(data.error || 'Špatný PIN'); pin=''; updateDots(); }
      } catch { showError('Chyba připojení'); pin=''; updateDots(); }
    }
    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg; el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
